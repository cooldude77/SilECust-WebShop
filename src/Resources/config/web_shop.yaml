services:
  _defaults:
    autowire: true
    autoconfigure: true
  App\Service\Component\Controller\HttpKernelHelper:
    public: true
    arguments:
      - "@request_stack"
      - "@http_kernel"

  App\Service\Component\Controller\RequestStackHelper:
    public: true
    arguments:
      - "@request_stack"
  App\Service\Component\Controller\ViewHelper:
    public: true
    arguments:
      - "@twig"

  silecust_controller_http_helper:
    alias: App\Service\Component\Controller\HttpKernelHelper
  silecust_controller_request_helper:
    alias: App\Service\Component\Controller\RequestStackHelper
  silecust_controller_view_helper:
    alias: App\Service\Component\Controller\ViewHelper
  App\Service\Component\UI\Panel\Session\SessionAndMethodChecker:
    public: true

  App\Controller\Home\HomeController:
    public: true
    arguments:
      - "@event_dispatcher"

  App\Controller\Module\WebShop\External\Shop\MainController:
    public: true
    arguments:
      - "@event_dispatcher"
  App\Service\Component\UI\Panel\PanelMainController:
    public: true
    arguments:
      - "@event_dispatcher"
  App\Service\Component\UI\Panel\Components\PanelHeadController:
    public: true
    arguments:
      - "@event_dispatcher"
  App\Service\Component\UI\Panel\Components\PanelHeaderController:
    public: true
    arguments:
      - "@event_dispatcher"
  App\Controller\Module\WebShop\External\Shop\Components\HeadController:
    public: true
    arguments:
      - "@event_dispatcher"
  App\Controller\Module\WebShop\External\Shop\Components\HeaderController:
    public: true
    arguments:
      - "@event_dispatcher"
