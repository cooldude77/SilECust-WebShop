services:
  _defaults:
    autowire: true
    autoconfigure: true


  App\Service\Security\User\Customer\CustomerService: ~
  App\Service\Security\User\Mapper\SignUpDTOMapper: ~


  App\Controller\Security\External\Credentials\Login\LoginManagementController:
    arguments:
      - "@event_dispatcher"
  App\Controller\Security\External\Credentials\SignUp\SignUpController:
    arguments:
      - "@event_dispatcher"
  App\Controller\Security\External\Credentials\ChangePasswordController:
    arguments:
      - "@event_dispatcher"
  App\Controller\Security\External\Credentials\ResetPasswordController:
    arguments:
      - "@event_dispatcher"
  App\Command\Security\User\SuperUserCreateCommand:
    arguments:
      - "@security.user_password_hasher"
